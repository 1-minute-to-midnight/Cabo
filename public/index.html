<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cabo Online</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=IBM+Plex+Mono:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,500;8..60,650&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="topbar" aria-label="Room controls">
        <div>
          <p class="eyebrow">Cabo Online</p>
          <h1 id="roomTitle">Private table</h1>
        </div>
        <div class="join-panel" id="joinPanel">
          <input id="nameInput" maxlength="24" autocomplete="nickname" placeholder="Name">
          <input id="roomInput" maxlength="5" autocomplete="off" placeholder="Code">
          <button id="createBtn" type="button">Create</button>
          <button id="joinBtn" type="button">Join</button>
        </div>
        <div class="room-panel hidden" id="roomPanel">
          <button id="copyBtn" type="button" title="Copy invite">Copy Code</button>
          <button id="addBotBtn" type="button">Add AI</button>
          <button id="startBtn" type="button">Start</button>
          <button id="leaveBtn" type="button">Leave</button>
        </div>
      </section>

      <section class="notice" id="notice" role="status"></section>

      <section class="table" aria-label="Cabo table">
        <div class="draw-zone">
          <button class="pile deck" id="deckBtn" type="button">
            <span class="pile-mark">CABO</span>
            <strong id="deckCount">0</strong>
          </button>
          <button class="pile discard" id="discardBtn" type="button">
            <span>Discard</span>
            <strong id="discardTop">--</strong>
          </button>
          <div class="drawn-card" id="drawnCard"></div>
          <div class="turn-actions">
            <button id="discardDrawnBtn" type="button">Discard</button>
            <button id="swapPowerBtn" type="button">Swap</button>
            <button id="caboBtn" type="button">Call Cabo</button>
            <button id="skipPowerBtn" type="button">Skip</button>
          </div>
        </div>

        <div class="players" id="players"></div>
      </section>

      <aside class="side">
        <section>
          <h2>Table</h2>
          <div id="statusText" class="status-text">Create or join a room.</div>
        </section>
        <section>
          <h2>Variant</h2>
          <p class="rules">Lowest score wins. A=1, numbers as shown, J/Q=10, red K=-1, black K=13. 7/8 peek yours. 9/10 peek theirs. J blind swaps. Q looks then must swap. Black K looks both, then may swap.</p>
        </section>
        <section>
          <h2>Log</h2>
          <ol id="logList" class="log"></ol>
        </section>
      </aside>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js" type="module"></script>
  </body>
</html>
